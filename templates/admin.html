<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | LabourMitra</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
    }

    .admin-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .stat-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      text-align: center;
      border: 1px solid #e2e8f0;
    }

    .stat-card h3 {
      font-size: 14px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .stat-card .value {
      font-size: 36px;
      font-weight: 700;
      color: #1e293b;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .admin-header h1 {
      font-size: 28px;
      color: #1e293b;
    }
  </style>
</head>

<body style="background: linear-gradient(to right, #f8f9fa, #e9ecef);">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('home') }}">
        <span style="color:#FFC107;">Labour</span>
        <span class="text-primary">Mitra</span> Admin
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link text-danger" href="{{ url_for('logout') }}">Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-header">
      <h1>System Overview</h1>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Registered Users</h3>
        <div class="value">{{ total_users }}</div>
      </div>
      <div class="stat-card">
        <h3>Total Bookings</h3>
        <div class="value">{{ total_bookings }}</div>
      </div>
      <div class="stat-card">
        <h3>Total Earnings (Platform Fees)</h3>
        <div class="value">₹{{ total_earnings }}</div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
